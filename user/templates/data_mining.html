{% extends 'user_base.html' %}
{% block title %}User Profile{% endblock %}
{% block content %}
<div class="mainContent">  
  <form  method="POST" class="form" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="formHeader row">
        <h2 class="text-1 fl">Make a data mining request</h2>
        {{ form.non_field_errors }}
        <div class="fr">
            <button type="submit" class="btnSave bg-1 text-fff text-bold fr">SAVE</button>
        </div>
    </div>
    <div class="formBody row">
        <div class="column s-6">
          {{ form.data_to_mine.errors }}
            <label class="inputGroup">
                <span>Data to Mine</span>
                <span>{{ form.data_to_mine }}</span>
            </label>
            {{ form.name.errors }}
            <label class="inputGroup">
                <span>Name</span>
                <span>{{ form.name }}</span>
            </label>
            {{ form.email.errors }}
            <label class="inputGroup">
                <span>Email</span>
                <span>{{ form.email }}</span>
            </label>
            {{ form.phone.errors }}
            <label class="inputGroup">
                <span>Phone</span>
                <span>{{ form.phone }}</span>
            </label>
            <label class="inputGroup">
                <span>Description</span>
                <span>{{ form.description }}</span>
            </label>
        </div>
        <!--
            <label class="inputGroup">
                <span>Image</span>
                <input type="hidden" name="img" value="src">
                <span>
                    <input type="file" name="img" onchange="getImg(this)" multiple>
                    <img src="http://bookstore.crunchpress.com/wp-content/uploads/2013/05/b2.jpg" alt="" width="50">
                </span>
                
            </label>
            -->
        </div>

    </form> 
</div>

{% endblock %}
