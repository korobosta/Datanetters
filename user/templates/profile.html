{% extends 'user_base.html' %}
{% block title %}User Profile{% endblock %}
{% block content %}
<div class="mainContent">  
  <form  method="POST" class="form">
    {% csrf_token %}
    <div class="formHeader row">
        <h2 class="text-1 fl">User Details</h2>
        {{ form.non_field_errors }}
        <div class="fr">
            <button type="submit" class="btnSave bg-1 text-fff text-bold fr">SAVE</button>
        </div>
    </div>
    <div class="formBody row">
        <div class="column s-6">
          {{ form.first_name.errors }}
            <label class="inputGroup">
                <span>First Name</span>
                <span>{{ form.first_name }}</span>
            </label>
            {{ form.last_name.errors }}
            <label class="inputGroup">
                <span>Last Name</span>
                <span>{{ form.last_name }}</span>
            </label>
            {{ form.email.errors }}
            <label class="inputGroup">
                <span>Email</span>
                <span>{{ form.email }}</span>
            </label>
            {{ form.username.errors }}
            <label class="inputGroup">
                <span>Username</span>
                <span>{{ form.username }}</span>
            </label>
        </div>
        <!--
            <label class="inputGroup">
                <span>Image</span>
                <input type="hidden" name="img" value="src">
                <span>
                    <input type="file" name="img" onchange="getImg(this)" multiple>
                    <img src="http://bookstore.crunchpress.com/wp-content/uploads/2013/05/b2.jpg" alt="" width="50">
                </span>
                
            </label>
            -->
        </div>

    </form> 
</div>

{% endblock %}
